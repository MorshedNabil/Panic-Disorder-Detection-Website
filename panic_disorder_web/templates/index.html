{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panic Disorder Assessment</title>
    <link rel="stylesheet" href="{% static 'styles.css' %}">
</head>
<body>
    <div class="container">
        <div class="form-wrapper">
            <div class="header">
                <h1>Panic Disorder Assessment Form</h1>
                <p>Please fill in the following information to help us understand your condition better.</p>
            </div>
            
            <form id="assessmentForm" class="assessment-form">
                <div class="form-grid">
                    <!-- Age -->
                    <div class="form-group">
                        <label for="age" class="form-label">Age</label>
                        <select id="age" name="age" required>
                            <option value="">Select your age range</option>
                            <option value="18-25">18-25</option>
                            <option value="26-35">26-35</option>
                            <option value="36-45">36-45</option>
                            <option value="46-55">46-55</option>
                            <option value="56-65">56-65</option>
                            <option value="65+">65+</option>
                        </select>
                    </div>

                    <!-- Lifestyle Factors -->
                    <div class="form-group">
                        <label for="lifestyle" class="form-label">Lifestyle Factors</label>
                        <select id="lifestyle" name="lifestyle" required>
                            <option value="">Select lifestyle factors</option>
                            <option value="sedentary">Sedentary</option>
                            <option value="lightly-active">Lightly Active</option>
                            <option value="moderately-active">Moderately Active</option>
                            <option value="very-active">Very Active</option>
                            <option value="poor-sleep">Poor Sleep Habits</option>
                            <option value="good-sleep">Good Sleep Habits</option>
                            <option value="poor-diet">Poor Diet</option>
                            <option value="healthy-diet">Healthy Diet</option>
                        </select>
                    </div>

                    <!-- Current Stressors -->
                    <div class="form-group">
                        <label for="stressors" class="form-label">Current Stressors</label>
                        <select id="stressors" name="stressors" required>
                            <option value="">Select current stressors</option>
                            <option value="work">Work Stress</option>
                            <option value="relationship">Relationship Issues</option>
                            <option value="financial">Financial Pressure</option>
                            <option value="health">Health Concerns</option>
                            <option value="family">Family Problems</option>
                            <option value="social">Social Pressure</option>
                            <option value="multiple">Multiple Stressors</option>
                            <option value="none">No Major Stressors</option>
                        </select>
                    </div>

                    <!-- Symptoms -->
                    <div class="form-group">
                        <label for="symptoms" class="form-label">Symptoms</label>
                        <select id="symptoms" name="symptoms" required>
                            <option value="">Select primary symptoms</option>
                            <option value="chest-pain">Chest Pain</option>
                            <option value="breathlessness">Breathlessness</option>
                            <option value="heart-palpitations">Heart Palpitations</option>
                            <option value="dizziness">Dizziness</option>
                            <option value="sweating">Sweating</option>
                            <option value="trembling">Trembling</option>
                            <option value="nausea">Nausea</option>
                            <option value="multiple-symptoms">Multiple Symptoms</option>
                        </select>
                    </div>

                    <!-- Severity -->
                    <div class="form-group">
                        <label for="severity" class="form-label">Severity</label>
                        <select id="severity" name="severity" required>
                            <option value="">Select severity level</option>
                            <option value="mild">Mild</option>
                            <option value="moderate">Moderate</option>
                            <option value="severe">Severe</option>
                            <option value="very-severe">Very Severe</option>
                        </select>
                    </div>

                    <!-- Impact on Life -->
                    <div class="form-group">
                        <label for="impact" class="form-label">Impact on Life</label>
                        <select id="impact" name="impact" required>
                            <option value="">Select impact level</option>
                            <option value="minimal">Minimal Impact</option>
                            <option value="moderate-impact">Moderate Impact</option>
                            <option value="significant">Significant Impact</option>
                            <option value="severe-impact">Severe Impact</option>
                            <option value="disabled">Severely Disabled</option>
                        </select>
                    </div>

                    <!-- Coping Mechanisms -->
                    <div class="form-group">
                        <label for="coping" class="form-label">Coping Mechanisms</label>
                        <select id="coping" name="coping" required>
                            <option value="">Select primary coping mechanisms</option>
                            <option value="exercise">Exercise</option>
                            <option value="meditation">Meditation/Mindfulness</option>
                            <option value="social">Social Support</option>
                            <option value="therapy">Professional Therapy</option>
                            <option value="medication">Medication</option>
                            <option value="breathing">Breathing Exercises</option>
                            <option value="hobbies">Hobbies</option>
                            <option value="none">No Coping Strategies</option>
                        </select>
                    </div>

                    <!-- Family History -->
                    <div class="form-group">
                        <label for="family-history" class="form-label">Family History</label>
                        <select id="family-history" name="family-history" required>
                            <option value="">Select family history</option>
                            <option value="panic-disorder">Panic Disorder</option>
                            <option value="anxiety">Anxiety Disorders</option>
                            <option value="depression">Depression</option>
                            <option value="other-mental">Other Mental Health Issues</option>
                            <option value="no-history">No Known History</option>
                            <option value="unknown">Unknown</option>
                        </select>
                    </div>

                    <!-- Social Support -->
                    <div class="form-group">
                        <label for="social-support" class="form-label">Social Support</label>
                        <select id="social-support" name="social-support" required>
                            <option value="">Select social support level</option>
                            <option value="very-weak">Very Weak</option>
                            <option value="weak">Weak</option>
                            <option value="moderate">Moderate</option>
                            <option value="strong">Strong</option>
                            <option value="very-strong">Very Strong</option>
                        </select>
                    </div>

                    <!-- Personal History -->
                    <div class="form-group">
                        <label for="personal-history" class="form-label">Personal History</label>
                        <select id="personal-history" name="personal-history" required>
                            <option value="">Select personal history</option>
                            <option value="first-episode">First Episode</option>
                            <option value="recurring">Recurring Episodes</option>
                            <option value="chronic">Chronic Condition</option>
                            <option value="previous-treatment">Previous Treatment</option>
                            <option value="untreated">Previously Untreated</option>
                        </select>
                    </div>
                </div>

                <div class="button-group">
                    <button type="submit" class="btn btn-primary">Submit Assessment</button>
                    <button type="reset" class="btn btn-secondary">Clear Form</button>
                </div>
            </form>
        </div>
    </div>

    <script src="{% static 'js/main.js' %}"></script>
</body>
</html>
