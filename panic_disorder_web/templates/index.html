{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panic Disorder Assessment</title>
    <link rel="stylesheet" href="{% static 'styles/styles.css' %}">
</head>
<body>
    <div class="container">
        <div class="form-wrapper">
            <div class="header">
                <h1>Panic Disorder Assessment Form</h1>
                <p>Please fill in the following information to help us understand your condition better.</p>
            </div>
            
            <form id="assessmentForm" class="assessment-form">
                {% csrf_token %}
                <div class="form-grid">
                    <!-- Age -->
                    <div class="form-group">
                        <label for="age" class="form-label">Age</label>
                        <input type="number" id="age" name="age" required>
                    </div>

                    <!-- Lifestyle Factors -->
                    <div class="form-group">
                        <label for="lifestyle" class="form-label">Lifestyle Factors</label>
                        <select id="lifestyle" name="lifestyle" required>
                            <option value="">Select lifestyle factors</option>
                            <option value="Sleep Quality">Sleep Quality</option>
                            <option value="Exercise">Exercise</option>
                            <option value="Diet">Diet</option>
                        </select>
                    </div>

                    <!-- Current Stressors -->
                    <div class="form-group">
                        <label for="stressors" class="form-label">Current Stressors</label>
                        <select id="stressors" name="stressors" required>
                            <option value="">Select current stressors</option>
                            <option value="Moderate">Moderate</option>
                            <option value="High">High</option>
                            <option value="Low">Low</option>
                        </select>
                    </div>

                    <!-- Symptoms -->
                    <div class="form-group">
                        <label for="symptoms" class="form-label">Symptoms</label>
                        <select id="symptoms" name="symptoms" required>
                            <option value="">Select primary symptoms</option>
                            <option value="Chest Pain">Chest Pain</option>
                            <option value="Shortness of Breath">Shortness of Breath</option>
                            <option value="Panic Attacks">Panic Attacks</option>
                            <option value="Dizziness">Dizziness</option>
                            <option value="Fear of Losing Control">Fear of Losing Control</option>
                        </select>
                    </div>

                    <!-- Severity -->
                    <div class="form-group">
                        <label for="severity" class="form-label">Severity</label>
                        <select id="severity" name="severity" required>
                            <option value="">Select severity level</option>
                            <option value="Mild">Mild</option>
                            <option value="Moderate">Moderate</option>
                            <option value="Severe">Severe</option>
                        </select>
                    </div>

                    <!-- Impact on Life -->
                    <div class="form-group">
                        <label for="impact" class="form-label">Impact on Life</label>
                        <select id="impact" name="impact" required>
                            <option value="">Select impact level</option>
                            <option value="Mild">Mild</option>
                            <option value="Significant">Significant</option>
                            <option value="Moderate">Moderate</option>
                        </select>
                    </div>

                    <!-- Coping Mechanisms -->
                    <div class="form-group">
                        <label for="coping-mechanisms" class="form-label">Coping Mechanisms</label>
                        <select id="coping-mechanisms" name="coping-mechanisms" required>
                            <option value="">Select primary coping mechanisms</option>
                            <option value="Exercise">Exercise</option>
                            <option value="Meditation">Meditation</option>
                            <option value="Socializing">Socializing</option>
                            <option value="Seeking Therapy">Seeking Therapy</option>
                        </select>
                    </div>

                    <!-- Family History -->
                    <div class="form-group">
                        <label for="family-history" class="form-label">Family History</label>
                        <select id="family-history" name="family-history" required>
                            <option value="">Select family history</option>
                            <option value="Yes">Yes</option>
                            <option value="No">No</option>
                        </select>
                    </div>

                    <!-- Social Support -->
                    <div class="form-group">
                        <label for="social-support" class="form-label">Social Support</label>
                        <select id="social-support" name="social-support" required>
                            <option value="">Select social support level</option>
                            <option value="High">High</option>
                            <option value="Moderate">Moderate</option>
                            <option value="Low">Low</option>
                        </select>
                    </div>

                    <!-- Personal History -->
                    <div class="form-group">
                        <label for="personal-history" class="form-label">Personal History</label>
                        <select id="personal-history" name="personal-history" required>
                            <option value="">Select personal history</option>
                            <option value="Yes">Yes</option>
                            <option value="No">No</option>
                        </select>
                    </div>
                </div>

                <div class="button-group">
                    <button type="submit" class="btn btn-primary">Submit Assessment</button>
                    <button type="reset" class="btn btn-secondary">Clear Form</button>
                </div>
            </form>

            <!-- Result Card -->
            <div id="resultCard" class="result-card hidden">
                <div class="result-header">
                    <h2>Assessment Result</h2>
                    <button type="button" class="close-btn" onclick="closeResultCard()">X</button>
                </div>
                <div class="result-content">
                    <div class="result-prediction">
                        <p class="result-label">Prediction:</p>
                        <p id="predictionResult" class="result-value">-</p>
                    </div>
                    <div class="result-confidence">
                        <p class="result-label">Confidence:</p>
                        <div class="confidence-bar">
                            <div id="confidenceBar" class="confidence-fill"></div>
                        </div>
                        <p id="confidenceText" class="confidence-text">0%</p>
                    </div>
                    <div class="result-message">
                        <p id="resultMessage" class="message-text"></p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="{% static 'js/main.js' %}"></script>
</body>
</html>
